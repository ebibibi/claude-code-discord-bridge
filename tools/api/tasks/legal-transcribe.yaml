id: legal-transcribe
name: 就業条件明示書 作成
description: 派遣個別契約書（Excel）から就業条件明示書を自動作成します。38項目を自動転記し、確認後にダウンロードできます。
department: 法務
category: 契約書処理
icon: 📋
version: 1.0.0

input:
  files:
    - name: contract
      label: 派遣個別契約書
      accept: .xlsx
      required: true
      max_size_mb: 10

output:
  files:
    - name: meijisho
      label: 就業条件明示書
      format: xlsx
      template: templates/meijisho_template.xlsx
  preview:
    type: field_mapping
    editable: true

processing:
  model: claude-sonnet-4-6
  skill: jbs-legal-transcribe
  system_prompt_file: prompts/legal-transcribe.md
  field_mapping_file: mappings/legal-transcribe-fields.json
  timeout_seconds: 120

access:
  roles:
    - legal
    - all-staff
